name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #6.4.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o manticore ./cmd/manticore

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #4.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #3.0.5

      - name: Verify distroless base image signature
        id: base
        env:
          BASE_REF: gcr.io/distroless/static-debian13@sha256:e3f945647ffb95b5839c07038d64f9811adf17308b9121d8a2b87b6a22a80a39
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect "${BASE_REF}" --format '{{.Manifest.Digest}}')
          repo="${BASE_REF%@*}"
          pinned="${repo}@${digest}"
          echo "Verifying ${pinned}"
          cosign verify "${pinned}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com \
            > /dev/null
          echo "pinned=${pinned}" >> "${GITHUB_OUTPUT}"

      - name: Validate Dockerfile builds
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #7.1.0
        with:
          context: .
          push: false
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.pinned }}
          cache-from: type=gha
          cache-to: type=gha,mode=max