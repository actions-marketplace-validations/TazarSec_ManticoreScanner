name: "Manticore Scanner"
description: "Detect malicious npm dependencies through behavioral analysis."
author: "Manticore"
branding:
  icon: "shield"
  color: "red"

inputs:
  auth-mode:
    description: "Authentication mode: 'github-oidc' (default) or 'api-key'. github-oidc requires the calling workflow to grant `permissions: id-token: write`."
    required: false
    default: "github-oidc"
  api-key:
    description: "Manticore API key. Required when auth-mode is 'api-key'; ignored when auth-mode is 'github-oidc'."
    required: false
    default: ""
  api-url:
    description: "Manticore API base URL. Defaults to the CLI's built-in value."
    required: false
    default: ""
  file:
    description: "Path to package.json or package-lock.json. Auto-detected in the working directory if omitted."
    required: false
    default: ""
  format:
    description: "Output format: table, json, or sarif."
    required: false
    default: ""
  output:
    description: "Write results to this file instead of stdout."
    required: false
    default: ""
  fail-on:
    description: "Exit non-zero if any package has a suspicion score at or above this threshold. Defaults to 1 (any non-zero score fails the job)."
    required: false
    default: ""
  ignore-list:
    description: "Path to a file with packages to skip (one per line; each entry must be name@version or an integrity hash like sha512-...; '#' starts a comment)."
    required: false
    default: ""
  http-timeout:
    description: "Per-request HTTP timeout in seconds. Defaults to the CLI's built-in value (120)."
    required: false
    default: ""
  timeout:
    description: "Polling timeout in seconds — how long to wait for backend results before erroring or continuing per --on-error. Defaults to the CLI's built-in value (300)."
    required: false
    default: ""
  on-error:
    description: "What to do on backend errors or polling deadline exceeded with pending items: 'fail' (exit non-zero, default) or 'continue' (exit 0)."
    required: false
    default: ""
  production:
    description: "Skip devDependencies when set to 'true'."
    required: false
    default: "false"
  vcs-comment:
    description: "Post results as a PR comment when set to 'true'."
    required: false
    default: "false"
  insecure:
    description: "Allow plaintext http:// API URLs. Off by default — TLS is required."
    required: false
    default: "false"
  include-transitive:
    description: "Submit transitive dependencies. Off by default — direct deps only; backend behavioral analysis already exercises transitive code on install."
    required: false
    default: "false"
  version:
    description: "Release tag to install (e.g. v1.2.3). Defaults to the ref this action was invoked with."
    required: false
    default: ""
  working-directory:
    description: "Directory to run the scan from."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install manticore
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # Default to the repository that this action was resolved from.
        repo="${ACTION_REPOSITORY:-}"
        if [ -z "${repo}" ]; then
          # Fallback for local checkout usage.
          repo="${GITHUB_REPOSITORY}"
        fi

        version="${INPUT_VERSION}"
        if [ -z "${version}" ]; then
          version="${ACTION_REF:-}"
        fi
        if [ -z "${version}" ] || [ "${version}" = "main" ] || [ "${version}" = "master" ]; then
          version=$(gh release view --repo "${repo}" --json tagName -q .tagName)
        fi

        if [[ "${version}" =~ ^[0-9a-f]{40}$ ]]; then
          echo "Resolving commit ${version} to a release tag..."
          resolved=$(gh api "repos/${repo}/git/matching-refs/tags" \
            --jq ".[] | select(.object.sha == \"${version}\") | .ref" \
            | sed 's|^refs/tags/||' \
            | head -n1)
          if [ -z "${resolved}" ]; then
            echo "Commit ${version} is not pointed at by any release tag in ${repo}." >&2
            echo "Pin to a tagged release commit, or pass version: vX.Y.Z explicitly." >&2
            exit 1
          fi
          version="${resolved}"
          echo "Resolved to ${version}"
        fi

        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        case "${os}" in
          linux|darwin) ;;
          mingw*|msys*|cygwin*) os=windows ;;
          *) echo "Unsupported OS: ${os}" >&2; exit 1 ;;
        esac

        arch=$(uname -m)
        case "${arch}" in
          x86_64|amd64) arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
          *) echo "Unsupported arch: ${arch}" >&2; exit 1 ;;
        esac

        ext=""
        if [ "${os}" = "windows" ]; then
          ext=".exe"
        fi

        asset="manticore-${os}-${arch}${ext}"
        install_dir="${RUNNER_TEMP}/manticore-${version}"
        mkdir -p "${install_dir}"

        case "${version}" in
          -*) echo "Refusing to download release with flag-like tag: ${version}" >&2; exit 1 ;;
        esac

        echo "Downloading ${asset} from ${repo}@${version}"
        gh release download \
          --repo "${repo}" \
          --pattern "${asset}" \
          --pattern "checksums.txt" \
          --dir "${install_dir}" \
          --clobber \
          -- "${version}"

        (
          cd "${install_dir}"
          # Keep only the entry for our asset so sha256sum doesn't fail on
          # missing files for other platforms.
          grep "  ${asset}\$" checksums.txt > "${asset}.sha256"
          sha256sum -c "${asset}.sha256"
        )

        gh attestation verify "${install_dir}/${asset}" --repo "${repo}"

        chmod +x "${install_dir}/${asset}"
        mv "${install_dir}/${asset}" "${install_dir}/manticore${ext}"
        echo "${install_dir}" >> "${GITHUB_PATH}"

    - name: Run manticore scan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        MANTICORE_API_KEY: ${{ inputs.api-key }}
        MANTICORE_API_URL: ${{ inputs.api-url }}
        MANTICORE_AUTH_MODE: ${{ inputs.auth-mode }}
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_FILE: ${{ inputs.file }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_IGNORE_LIST: ${{ inputs.ignore-list }}
        INPUT_HTTP_TIMEOUT: ${{ inputs.http-timeout }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_ON_ERROR: ${{ inputs.on-error }}
        INPUT_PRODUCTION: ${{ inputs.production }}
        INPUT_VCS_COMMENT: ${{ inputs.vcs-comment }}
        INPUT_INSECURE: ${{ inputs.insecure }}
        INPUT_INCLUDE_TRANSITIVE: ${{ inputs.include-transitive }}
      run: |
        set -euo pipefail
        args=(scan)
        [ -n "${INPUT_FILE}" ]     && args+=(--file "${INPUT_FILE}")
        [ -n "${INPUT_FORMAT}" ]   && args+=(--format "${INPUT_FORMAT}")
        [ -n "${INPUT_OUTPUT}" ]   && args+=(--output "${INPUT_OUTPUT}")
        [ -n "${INPUT_FAIL_ON}" ]  && args+=(--fail-on "${INPUT_FAIL_ON}")
        [ -n "${INPUT_IGNORE_LIST}" ] && args+=(--ignore-list "${INPUT_IGNORE_LIST}")
        [ -n "${INPUT_HTTP_TIMEOUT}" ] && args+=(--http-timeout "${INPUT_HTTP_TIMEOUT}")
        [ -n "${INPUT_TIMEOUT}" ] && args+=(--timeout "${INPUT_TIMEOUT}")
        [ -n "${INPUT_ON_ERROR}" ] && args+=(--on-error "${INPUT_ON_ERROR}")
        [ "${INPUT_PRODUCTION}" = "true" ]         && args+=(--production)
        [ "${INPUT_VCS_COMMENT}" = "true" ]        && args+=(--vcs-comment)
        [ "${INPUT_INSECURE}" = "true" ]           && args+=(--insecure)
        [ "${INPUT_INCLUDE_TRANSITIVE}" = "true" ] && args+=(--include-transitive)
        exec manticore "${args[@]}"